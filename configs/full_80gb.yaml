defaults:
  - data: parallel_wmt24pp_flores
  - model: qwen3_5_4b_base
  - finetune: full
  - preprocessing: default
  - training: gpu80
  - evaluation: gpu80
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "parallel-cpt-full-80gb"
  output_root: "artifacts/cpt_parallel_full_80gb"
  processed_dir: "data/processed/cpt_parallel"

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

