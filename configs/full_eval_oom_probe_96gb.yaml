defaults:
  - data: korean_financial_cpt
  - model: qwen3_5_4b_base
  - finetune: full
  - preprocessing: default
  - training: gpu96
  - evaluation: gpu96
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "korean-financial-cpt-full-eval-oom-probe-96gb"
  output_root: "artifacts/cpt_full_eval_oom_probe_96gb"
  processed_dir: "data/processed/cpt_korean_financial"

training:
  max_steps: 100
  num_train_epochs: 1
  logging_steps: 1
  evaluation_strategy: "steps"
  eval_steps: 1
  eval_on_start: false
  save_strategy: "steps"
  save_steps: 10
  save_total_limit: 3
  per_device_eval_batch_size: ${training.per_device_train_batch_size}

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
