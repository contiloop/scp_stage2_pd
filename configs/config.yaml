defaults:
  - data: korean_financial_plus_rlhf
  - model: qwen3_5_4b_base
  - finetune: full
  - preprocessing: default
  - training: default
  - evaluation: default
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "korean-financial-cpt-full"
  output_root: "artifacts/cpt_full"
  processed_dir: "data/processed/cpt_korean_financial"

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
