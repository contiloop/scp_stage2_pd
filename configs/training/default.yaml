dataset_dir: ${preprocessing.output_dir}
output_dir: ${experiment.output_root}/checkpoints
overwrite_output_dir: false

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16

learning_rate: 1.0e-5
weight_decay: 0.0
warmup_ratio: 0.1
lr_scheduler_type: "cosine"
optim: "adamw_torch"
max_grad_norm: 3.5

logging_steps: 10
save_strategy: "steps"
save_steps: 200
save_total_limit: 1
evaluation_strategy: "steps"
eval_steps: 500
eval_on_start: false

dataloader_num_workers: 8
remove_unused_columns: false
gradient_checkpointing: ${model.gradient_checkpointing}
prevent_cross_sample_attention: false
freeze_embeddings: true

grad_norm_logging:
  enabled: true

runtime_packing:
  enabled: true
  strategy: "bfd_split"
  padding_free: true
  max_length: ${model.max_seq_length}

bf16: true
fp16: false
seed: ${seed}

resume_from_checkpoint: null
