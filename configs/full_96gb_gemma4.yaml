defaults:
  - data: korean_financial_plus_rlhf
  - model: gemma_4_e2b
  - finetune: full
  - preprocessing: default
  - training: gpu96
  - evaluation: gpu96
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "korean-financial-cpt-full-96gb-gemma4"
  output_root: "artifacts/cpt_full_96gb_gemma4"
  processed_dir: "data/processed/cpt_korean_financial_gemma4"

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
