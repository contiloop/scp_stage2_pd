defaults:
  - data: parallel_wmt24pp_flores
  - model: alwaysgood_qwen3_4b_cpt
  - finetune: full
  - preprocessing: default
  - training: gpu96
  - evaluation: gpu96
  - logging: wandb
  - _self_

seed: 42

experiment:
  name: "parallel-cpt-full-96gb-alwaysgood-qwen3-4b-cpt"
  output_root: "artifacts/cpt_parallel_full_96gb_alwaysgood_qwen3_4b_cpt"
  processed_dir: "data/processed/cpt_parallel"

hydra:
  run:
    dir: ${experiment.output_root}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${experiment.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
